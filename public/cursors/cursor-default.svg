<svg width="54" height="72" viewBox="0 0 54 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thumb -->
  <ellipse cx="7" cy="46" rx="6.5" ry="10" fill="#FFFDF4" stroke="#1A6B6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Ring finger -->
  <rect x="38" y="14" width="13" height="34" rx="6.5" fill="#FFFDF4" stroke="#1A6B6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Middle finger (tallest) -->
  <rect x="22" y="6" width="14" height="40" rx="7" fill="#FFFDF4" stroke="#1A6B6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Index finger -->
  <rect x="8" y="12" width="13" height="36" rx="6.5" fill="#FFFDF4" stroke="#1A6B6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Palm (drawn last so it covers finger bases) -->
  <rect x="5" y="38" width="46" height="28" rx="12" fill="#FFFDF4" stroke="#1A6B6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Knuckle dimples -->
  <circle cx="14.5" cy="34" r="1.8" fill="#1A6B6B" opacity="0.2"/>
  <circle cx="29" cy="28" r="1.8" fill="#1A6B6B" opacity="0.2"/>
  <circle cx="44.5" cy="34" r="1.8" fill="#1A6B6B" opacity="0.2"/>
</svg>
